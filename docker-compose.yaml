version: '3.8'
services:
  # app service for your backend
  app:
    container_name: backend
    build:
      context: ./
      dockerfile: Dockerfile
    environment:
      DATABASE_NAME: tdd
      DATABASE_USER: tdd
      DATABASE_PASS: tdd
#      DATABASE_URI: # DATABASE_URI
    ports:
      - '4000:4000'
    depends_on:
      - database

  # start the mongodb service as container
  database:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: tdd
      MONGO_INITDB_ROOT_PASSWORD: tdd